name: Monitor de conciertos

on:
  schedule:
    # Corre cada 3 horas. Sintaxis cron en UTC.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}  # permite correrlo manualmente desde la pestaña Actions

jobs:
  check-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ANNOUNCE_CHAT_ID: ${{ secrets.TELEGRAM_ANNOUNCE_CHAT_ID }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python main.py

      - name: Guardar cambios de estado
        run: |
          git config user.name "concert-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Actualiza estado de eventos [skip ci]"
          git push
